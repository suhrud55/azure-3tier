trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# 1️⃣ Checkout repo
- checkout: self

# 2️⃣ Install Terraform manually
- script: |
    sudo apt-get update
    sudo apt-get install -y unzip wget

    wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip

    # Remove old binary if exists
    sudo rm -f /usr/local/bin/terraform

    unzip -o terraform_1.5.0_linux_amd64.zip
    sudo mv terraform /usr/local/bin/

    terraform -version
  displayName: 'Install Terraform'

# 3️⃣ Azure Login using Service Principal
- script: |
    echo "Logging in to Azure..."
    az login --service-principal \
      -u $(AZURE_SP_APP_ID) \
      -p $(AZURE_SP_SECRET) \
      --tenant $(AZURE_TENANT_ID)
    az account set --subscription $(AZURE_SUBSCRIPTION_ID)
  displayName: 'Azure Login'

# 4️⃣ Terraform Init & Apply
- script: |
    cd terraform
    terraform init
    terraform apply -auto-approve \
      -var="admin_username=$(VM_USER)" \
      -var="admin_password=$(VM_PASS)"
  displayName: 'Terraform Apply'

# 5️⃣ Get Terraform Outputs (VM IPs)
- script: |
    cd terraform
    WEB_IP=$(terraform output -raw web_public_ip)
    APP_IP=$(terraform output -raw app_private_ip)
    DB_IP=$(terraform output -raw db_private_ip)

    echo "##vso[task.setvariable variable=WEB_IP]$WEB_IP"
    echo "##vso[task.setvariable variable=APP_IP]$APP_IP"
    echo "##vso[task.setvariable variable=DB_IP]$DB_IP"
  displayName: 'Get VM IP Outputs'

# 6️⃣ Update Frontend Config with Backend IP
- script: |
    sed -i "s|<APP_VM_PRIVATE_IP>|$(APP_IP)|g" frontend/index.html
  displayName: 'Update Frontend Config'

# 7️⃣ Install sshpass
- script: |
    sudo apt-get update
    sudo apt-get install -y sshpass
  displayName: 'Install sshpass'

# 8️⃣ Setup Database VM
- script: |
    sshpass -p $(VM_PASS) scp -o StrictHostKeyChecking=no database/db_script.sql $(VM_USER)@$(DB_IP):~/db_script.sql
    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(DB_IP) "
      sudo apt update &&
      sudo apt install -y sqlite3 &&
      sqlite3 test.db < ~/db_script.sql
    "
  displayName: 'Setup Database VM'

# 9️⃣ Deploy Backend
- script: |
    sshpass -p $(VM_PASS) scp -o StrictHostKeyChecking=no -r backend/* $(VM_USER)@$(APP_IP):~/backend/
    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(APP_IP) "
      sudo apt update &&
      sudo apt install -y python3-pip sqlite3 &&
      cd ~/backend &&
      pip3 install -r requirements.txt &&
      nohup python3 backend.py > backend.log 2>&1 &
    "
  displayName: 'Deploy Backend'

# 🔟 Deploy Frontend
- script: |
    sshpass -p $(VM_PASS) scp -o StrictHostKeyChecking=no -r frontend/* $(VM_USER)@$(WEB_IP):~/frontend/
    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(WEB_IP) "
      sudo apt update &&
      sudo apt install -y python3 &&
      cd ~/frontend &&
      nohup python3 app.py > frontend.log 2>&1 &
    "
  displayName: 'Deploy Frontend'

# 1️⃣1️⃣ Show Final Output
- script: |
    echo "======================================"
    echo "Deployment Complete 🚀"
    echo "Web App URL: http://$(WEB_IP):3000"
    echo "======================================"
  displayName: 'Show App URL'