trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  VM_USER: '<your-vm-username>'
  VM_PASS: '<your-vm-password>'

steps:

# 1️⃣ Checkout repo
- checkout: self

# 2️⃣ Terraform Init & Apply using Azure DevOps service connection
- task: TerraformCLI@0
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: 'terraform'
    environmentServiceNameAzureRM: '<Your-Service-Connection-Name>'

- task: TerraformCLI@0
  displayName: 'Terraform Apply'
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: 'terraform'
    environmentServiceNameAzureRM: 'azure-connect'
    args: '-auto-approve -var="admin_username=$(VM_USER)" -var="admin_password=$(VM_PASS)"'

# 3️⃣ Export Terraform Outputs (VM IPs) to Variables
- script: |
    cd terraform
    WEB_IP=$(terraform output -raw web_public_ip)
    APP_IP=$(terraform output -raw app_private_ip)
    DB_IP=$(terraform output -raw db_private_ip)

    echo "##vso[task.setvariable variable=WEB_IP]$WEB_IP"
    echo "##vso[task.setvariable variable=APP_IP]$APP_IP"
    echo "##vso[task.setvariable variable=DB_IP]$DB_IP"
  displayName: 'Get VM IP Outputs'

# 4️⃣ Update Frontend Config with Backend App IP
- script: |
    sed -i "s|<APP_VM_PRIVATE_IP>|$(APP_IP)|g" frontend/index.html
  displayName: 'Update Frontend Config'

# 5️⃣ Install sshpass for SSH deployment
- script: |
    sudo apt-get update
    sudo apt-get install -y sshpass
  displayName: 'Install sshpass'

# 6️⃣ Setup Database VM
- script: |
    sshpass -p $(VM_PASS) scp -o StrictHostKeyChecking=no database/db_script.sql $(VM_USER)@$(DB_IP):~/db_script.sql
    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(DB_IP) "
      sudo apt update &&
      sudo apt install -y sqlite3 &&
      sqlite3 test.db < ~/db_script.sql
    "
  displayName: 'Setup Database VM'

# 7️⃣ Deploy Backend Code
- script: |
    sshpass -p $(VM_PASS) scp -o StrictHostKeyChecking=no -r backend/* $(VM_USER)@$(APP_IP):~/backend/
    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(APP_IP) "
      sudo apt update &&
      sudo apt install -y python3-pip sqlite3 &&
      cd ~/backend &&
      pip3 install -r requirements.txt &&
      nohup python3 backend.py > backend.log 2>&1 &
    "
  displayName: 'Deploy Backend'

# 8️⃣ Deploy Frontend Code
- script: |
    sshpass -p $(VM_PASS) scp -o StrictHostKeyChecking=no -r frontend/* $(VM_USER)@$(WEB_IP):~/frontend/
    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(WEB_IP) "
      sudo apt update &&
      sudo apt install -y python3 &&
      cd ~/frontend &&
      nohup python3 app.py > frontend.log 2>&1 &
    "
  displayName: 'Deploy Frontend'

# 9️⃣ Final Output
- script: |
    echo "======================================"
    echo "Deployment Complete 🚀"
    echo "Web App URL: http://$(WEB_IP):3000"
    echo "======================================"
  displayName: 'Show App URL'