trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# 1️⃣ Checkout repo
- checkout: self

# 2️⃣ Install Terraform
- script: |
    sudo apt-get update
    sudo apt-get install -y unzip wget

    wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip

    # Clean old files (IMPORTANT)
    rm -rf terraform tf_tmp
    sudo rm -rf /usr/local/bin/terraform

    # Extract safely
    mkdir tf_tmp
    unzip terraform_1.5.0_linux_amd64.zip -d tf_tmp

    # Move binary
    sudo mv tf_tmp/terraform /usr/local/bin/

    # Give execute permission
    sudo chmod +x /usr/local/bin/terraform

    # Verify
    terraform -version
  displayName: 'Install Terraform'

# 3️⃣ Azure Login
- script: |
    az login --service-principal \
      -u $(AZURE_SP_APP_ID) \
      -p $(AZURE_SP_SECRET) \
      --tenant $(AZURE_TENANT_ID)

    az account set --subscription $(AZURE_SUBSCRIPTION_ID)
  displayName: 'Azure Login'

# 4️⃣ Terraform Apply
- script: |
    terraform init
    terraform apply -auto-approve \
      -var="admin_username=$(VM_USER)" \
      -var="admin_password=$(VM_PASS)"
  workingDirectory: $(System.DefaultWorkingDirectory)/terraform
  displayName: 'Terraform Apply'
# 5️⃣ Get Outputs
- script: |
    cd terraform

    WEB_IP=$(terraform output -raw web_public_ip)
    APP_IP=$(terraform output -raw app_private_ip)
    DB_IP=$(terraform output -raw db_private_ip)

    echo "WEB_IP=$WEB_IP"
    echo "APP_IP=$APP_IP"
    echo "DB_IP=$DB_IP"

    echo "##vso[task.setvariable variable=WEB_IP]$WEB_IP"
    echo "##vso[task.setvariable variable=APP_IP]$APP_IP"
    echo "##vso[task.setvariable variable=DB_IP]$DB_IP"
  displayName: 'Get VM IPs'

# 6️⃣ Update Frontend
- script: |
    sed -i "s|<APP_VM_PRIVATE_IP>|$(APP_IP)|g" frontend/index.html
  displayName: 'Update Frontend Config'

# 7️⃣ Install sshpass
- script: |
    sudo apt-get update
    sudo apt-get install -y sshpass
  displayName: 'Install sshpass'

# 8️⃣ Setup DB via Web VM
- script: |
    echo "Setting up DB..."

    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(WEB_IP) << EOF

      echo "Copying DB script..."
      sshpass -p $(VM_PASS) scp database/db_script.sql $(VM_USER)@$(DB_IP):~/db_script.sql

      echo "Executing DB script..."
      sshpass -p $(VM_PASS) ssh $(VM_USER)@$(DB_IP) "
        sudo apt update &&
        sudo apt install -y sqlite3 &&
        sqlite3 test.db < ~/db_script.sql
      "

    EOF
  displayName: 'Setup Database VM'

# 9️⃣ Deploy Backend
- script: |
    echo "Deploying backend..."

    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(WEB_IP) << EOF

      sshpass -p $(VM_PASS) ssh $(VM_USER)@$(APP_IP) "mkdir -p ~/backend"

      sshpass -p $(VM_PASS) scp -r backend/* $(VM_USER)@$(APP_IP):~/backend/

      sshpass -p $(VM_PASS) ssh $(VM_USER)@$(APP_IP) "
        sudo apt update &&
        sudo apt install -y python3-pip sqlite3 &&
        cd ~/backend &&
        pip3 install -r requirements.txt &&
        nohup python3 backend.py > backend.log 2>&1 &
      "

    EOF
  displayName: 'Deploy Backend'

# 🔟 Deploy Frontend
- script: |
    sshpass -p $(VM_PASS) scp -o StrictHostKeyChecking=no -r frontend/* $(VM_USER)@$(WEB_IP):~/frontend/

    sshpass -p $(VM_PASS) ssh -o StrictHostKeyChecking=no $(VM_USER)@$(WEB_IP) "
      sudo apt update &&
      sudo apt install -y python3 &&
      cd ~/frontend &&
      nohup python3 app.py > frontend.log 2>&1 &
    "
  displayName: 'Deploy Frontend'

# 1️⃣1️⃣ Final Output
- script: |
    echo "======================================"
    echo "Deployment Complete 🚀"
    echo "Web App URL: http://$(WEB_IP):3000"
    echo "======================================"
  displayName: 'Show App URL'