<!DOCTYPE html>
<html>
<head>
    <title>3-Tier Sample App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Welcome to 3-Tier Sample App</h1>
    <form id="userForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <button type="submit">Submit</button>
    </form>
    <p id="responseMessage" style="color: green; font-weight: bold;"></p>
    <script>
        const form = document.getElementById('userForm');
        const responseMessage = document.getElementById('responseMessage');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const apiUrl = 'http://<APP_VM_PRIVATE_IP>:5000/users';
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value
            };
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                responseMessage.textContent = response.ok ? 'User added successfully!' : 'Error submitting data.';
                form.reset();
            } catch (err) {
                responseMessage.textContent = 'Could not reach backend API.';
                console.error(err);
            }
        });
    </script>
</body>
</html>
