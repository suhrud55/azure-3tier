name: Deploy 3-Tier App
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Set up Terraform
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      # 3️⃣ Login to Azure
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4️⃣ Terraform init, plan, apply
      - run: terraform init
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan

      # 5️⃣ Get VM IPs
      - name: Get IPs
        run: |
          echo "WEB_IP=$(terraform output -raw web_public_ip)" >> $GITHUB_ENV
          echo "APP_IP=$(terraform output -raw app_private_ip)" >> $GITHUB_ENV
          echo "DB_IP=$(terraform output -raw db_private_ip)" >> $GITHUB_ENV

      # 6️⃣ Update frontend with App VM private IP
      - name: Update frontend
        run: sed -i "s|<APP_VM_PRIVATE_IP>|${APP_IP}|g" web_sample_code/index.html

      # 7️⃣ Deploy Web VM (frontend)
      - name: Deploy Web VM
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ env.WEB_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          port: 22
          script: |
            mkdir -p ~/web_app
            scp -r ./web_sample_code/* ~/web_app/
            sudo apt-get update
            sudo apt-get install -y python3 python3-pip
            cd ~/web_app
            nohup python3 app.py &

      # 8️⃣ Deploy App VM (backend)
      - name: Deploy App VM
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ env.APP_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          port: 22
          script: |
            mkdir -p ~/app_backend
            scp -r ./app_sample_code/* ~/app_backend/
            cd ~/app_backend
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            export DB_HOST='${{ env.DB_IP }}'
            export DB_USER='sa'
            pip3 install -r requirements.txt
            nohup python3 backend.py &

      # 9️⃣ Deploy DB VM & run SQL script
      - name: Setup Database
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ env.DB_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          port: 22
          script: |
            sudo apt-get update
            sudo apt-get install -y mssql-tools unixodbc-dev
            # Copy the SQL script
            mkdir -p ~/db_setup
            scp ./db_script.sql ~/db_setup/
            # Run SQL script
            sqlcmd -S localhost -U sa -P '${{ secrets.DB_PASSWORD }}' -i ~/db_setup/db_script.sql